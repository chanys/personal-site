<svg viewBox="0 0 1000 614" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <style>.title { font-family: Georgia, 'Iowan Old Style', 'Times New Roman', serif; }</style>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="50%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="614" fill="#ffffff"/>

  <text class="title" x="40" y="52" font-size="32" font-weight="700" fill="#161B2B">Give each check the right cadence</text>

  <!-- spectrum axis -->
  <text x="65" y="112" font-size="12.5" font-weight="600" fill="#9AA0AE" text-anchor="middle">constant · cheap</text>
  <rect x="56" y="124" width="18" height="383" rx="9" fill="url(#g)"/>
  <path d="M55,507 L75,507 L65,524 Z" fill="#D97706"/>
  <text x="65" y="544" font-size="12.5" font-weight="600" fill="#9AA0AE" text-anchor="middle">rare · costly</text>

  <!-- rungs -->
  <rect x="104" y="124" width="856" height="58" rx="12" fill="#ffffff" stroke="#E5E7EF" stroke-width="1.2"/>
  <text x="128" y="161" font-size="22" font-weight="700" fill="#3730A3">Every trace</text>
  <text x="372" y="161" font-size="16.5" fill="#5B6170">code checks: schema, fields, citations</text>

  <rect x="104" y="189" width="856" height="58" rx="12" fill="#ffffff" stroke="#E5E7EF" stroke-width="1.2"/>
  <text x="128" y="226" font-size="22" font-weight="700" fill="#3730A3">Daily</text>
  <text x="372" y="226" font-size="16.5" fill="#5B6170">sampled judges: faithfulness, relevance</text>

  <rect x="104" y="254" width="856" height="58" rx="12" fill="#ffffff" stroke="#E5E7EF" stroke-width="1.2"/>
  <text x="128" y="291" font-size="22" font-weight="700" fill="#0F766E">Weekly</text>
  <text x="372" y="291" font-size="16.5" fill="#5B6170">human review of production traces</text>

  <rect x="104" y="319" width="856" height="58" rx="12" fill="#ffffff" stroke="#E5E7EF" stroke-width="1.2"/>
  <text x="128" y="356" font-size="22" font-weight="700" fill="#0F766E">Release</text>
  <text x="372" y="356" font-size="16.5" fill="#5B6170">regression suite vs. baseline</text>

  <rect x="104" y="384" width="856" height="58" rx="12" fill="#ffffff" stroke="#E5E7EF" stroke-width="1.2"/>
  <text x="128" y="421" font-size="22" font-weight="700" fill="#B45309">Monthly</text>
  <text x="372" y="421" font-size="16.5" fill="#5B6170">judge-agreement spot-check</text>

  <rect x="104" y="449" width="856" height="58" rx="12" fill="#ffffff" stroke="#E5E7EF" stroke-width="1.2"/>
  <text x="128" y="486" font-size="22" font-weight="700" fill="#B45309">Quarterly</text>
  <text x="372" y="486" font-size="16.5" fill="#5B6170">full eval-set audit</text>

  <!-- footer -->
  <line x1="80" y1="560" x2="920" y2="560" stroke="#EBECF2" stroke-width="1"/>
  <text x="500" y="590" font-size="17" font-style="italic" fill="#5B6170" text-anchor="middle">The cheaper the check, the more often it runs.</text>
</svg>
