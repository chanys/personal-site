<svg viewBox="0 0 1000 640" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <style>.title { font-family: Georgia, 'Iowan Old Style', 'Times New Roman', serif; }</style>
  </defs>

  <rect width="1000" height="640" fill="#ffffff"/>

  <text class="title" x="40" y="54" font-size="34" font-weight="700" fill="#161B2B">Check or judge?</text>
  <text x="40" y="90" font-size="19" fill="#6B7280">Each important failure mode becomes one or the other.</text>

  <!-- ===================== CHECK ===================== -->
  <rect x="40" y="120" width="440" height="452" rx="16" fill="#ffffff" stroke="#4F46E5" stroke-width="1.8"/>
  <text x="260" y="182" font-size="36" font-weight="700" fill="#3730A3" text-anchor="middle">CHECK</text>
  <text x="260" y="222" font-size="20" fill="#5B6170" text-anchor="middle">a function, no LLM call</text>
  <line x1="64" y1="254" x2="456" y2="254" stroke="#EBECF2" stroke-width="1"/>
  <text x="260" y="292" font-size="15" font-weight="600" letter-spacing="1.5" fill="#9AA0AE" text-anchor="middle">USE FOR</text>
  <text x="260" y="326" font-size="23" font-weight="700" fill="#1B2030" text-anchor="middle">structural failures</text>
  <circle cx="74" cy="369" r="5" fill="#4F46E5"/>
  <text x="92" y="375" font-size="19" fill="#374151">refund language present</text>
  <circle cx="74" cy="407" r="5" fill="#4F46E5"/>
  <text x="92" y="413" font-size="19" fill="#374151">required field missing</text>
  <circle cx="74" cy="445" r="5" fill="#4F46E5"/>
  <text x="92" y="451" font-size="19" fill="#374151">order ID dropped</text>
  <rect x="64" y="478" width="392" height="76" rx="12" fill="#EEF1FE"/>
  <text x="260" y="512" font-size="20" font-weight="700" fill="#1B2030" text-anchor="middle">cheap &amp; deterministic</text>
  <text x="260" y="537" font-size="17" fill="#4B5563" text-anchor="middle">run it on every change</text>

  <!-- ===================== JUDGE ===================== -->
  <rect x="520" y="120" width="440" height="452" rx="16" fill="#ffffff" stroke="#0D9488" stroke-width="1.8"/>
  <text x="740" y="182" font-size="36" font-weight="700" fill="#0F766E" text-anchor="middle">JUDGE</text>
  <text x="740" y="222" font-size="20" fill="#5B6170" text-anchor="middle">a separate LLM call</text>
  <line x1="544" y1="254" x2="936" y2="254" stroke="#EBECF2" stroke-width="1"/>
  <text x="740" y="292" font-size="15" font-weight="600" letter-spacing="1.5" fill="#9AA0AE" text-anchor="middle">USE FOR</text>
  <text x="740" y="326" font-size="23" font-weight="700" fill="#1B2030" text-anchor="middle">semantic failures</text>
  <circle cx="554" cy="369" r="5" fill="#0D9488"/>
  <text x="572" y="375" font-size="19" fill="#374151">redundant clarifying question</text>
  <circle cx="554" cy="407" r="5" fill="#0D9488"/>
  <text x="572" y="413" font-size="19" fill="#374151">wrong tone</text>
  <circle cx="554" cy="445" r="5" fill="#0D9488"/>
  <text x="572" y="451" font-size="19" fill="#374151">answered the wrong question</text>
  <rect x="544" y="478" width="392" height="76" rx="12" fill="#E9FBF6"/>
  <text x="740" y="512" font-size="20" font-weight="700" fill="#1B2030" text-anchor="middle">needs calibration</text>
  <text x="740" y="537" font-size="17" fill="#4B5563" text-anchor="middle">against human labels</text>

  <!-- ===================== FOOTER ===================== -->
  <line x1="80" y1="596" x2="920" y2="596" stroke="#EBECF2" stroke-width="1"/>
  <text x="500" y="624" font-size="18" font-style="italic" fill="#5B6170" text-anchor="middle">Structural → check. Semantic → judge. If code can decide it, don't ask an LLM.</text>
</svg>
