<svg viewBox="0 0 1000 540" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <style>.title { font-family: Georgia, 'Iowan Old Style', 'Times New Roman', serif; }</style>
  </defs>

  <rect width="1000" height="540" fill="#ffffff"/>

  <text class="title" x="40" y="50" font-size="30" font-weight="700" fill="#161B2B">Where GRPO fits: three lanes of post-training</text>
  <text x="40" y="84" font-size="17" fill="#6B7280">Post-training in 2026 has split into three lanes. What you have decides which.</text>

  <!-- ===================== GROUP BRACKETS ===================== -->
  <text x="342" y="124" font-size="13" font-weight="600" letter-spacing="1.2" fill="#9AA0AE" text-anchor="middle">GENERAL RLHF · PREFERENCE DATA</text>
  <path d="M40 146 L40 140 L644 140 L644 146" fill="none" stroke="#D7DAE3" stroke-width="1.4"/>
  <text x="816" y="124" font-size="13" font-weight="600" letter-spacing="1.2" fill="#9AA0AE" text-anchor="middle">RLVR · VERIFIABLE REWARDS</text>
  <path d="M672 146 L672 140 L960 140 L960 146" fill="none" stroke="#D7DAE3" stroke-width="1.4"/>

  <!-- ===================== PPO LANE ===================== -->
  <rect x="40" y="152" width="288" height="318" rx="16" fill="#ffffff" stroke="#4F46E5" stroke-width="1.8"/>
  <text x="184" y="200" font-size="27" font-weight="700" fill="#3730A3" text-anchor="middle">PPO</text>
  <text x="184" y="230" font-size="15" fill="#6B7280" text-anchor="middle">online RL against a</text>
  <text x="184" y="251" font-size="15" fill="#6B7280" text-anchor="middle">learned reward model</text>
  <line x1="58" y1="286" x2="310" y2="286" stroke="#EBECF2" stroke-width="1"/>
  <text x="62" y="310" font-size="12" font-weight="600" letter-spacing="1.2" fill="#9AA0AE">USED BY</text>
  <text x="62" y="334" font-size="16" font-weight="600" fill="#1B2030">Frontier labs</text>
  <text x="62" y="353" font-size="14" fill="#6B7280">OpenAI · Anthropic · Google</text>
  <rect x="56" y="374" width="256" height="82" rx="12" fill="#EEF1FE"/>
  <text x="72" y="398" font-size="12" font-weight="600" letter-spacing="1.2" fill="#3730A3">CHOOSE WHEN</text>
  <text x="184" y="422" font-size="16" font-weight="700" fill="#1B2030" text-anchor="middle">preference data +</text>
  <text x="184" y="442" font-size="16" font-weight="700" fill="#1B2030" text-anchor="middle">frontier-quality goals</text>

  <!-- ===================== DPO LANE ===================== -->
  <rect x="356" y="152" width="288" height="318" rx="16" fill="#ffffff" stroke="#D97706" stroke-width="1.8"/>
  <text x="500" y="200" font-size="27" font-weight="700" fill="#B45309" text-anchor="middle">DPO</text>
  <text x="500" y="230" font-size="15" fill="#6B7280" text-anchor="middle">one supervised loss</text>
  <text x="500" y="251" font-size="15" fill="#6B7280" text-anchor="middle">on preference pairs</text>
  <line x1="374" y1="286" x2="626" y2="286" stroke="#EBECF2" stroke-width="1"/>
  <text x="378" y="310" font-size="12" font-weight="600" letter-spacing="1.2" fill="#9AA0AE">USED BY</text>
  <text x="378" y="334" font-size="16" font-weight="600" fill="#1B2030">Open-source</text>
  <text x="378" y="353" font-size="14" fill="#6B7280">preference tuning</text>
  <rect x="372" y="374" width="256" height="82" rx="12" fill="#FEF3C7"/>
  <text x="388" y="398" font-size="12" font-weight="600" letter-spacing="1.2" fill="#B45309">CHOOSE WHEN</text>
  <text x="500" y="422" font-size="16" font-weight="700" fill="#1B2030" text-anchor="middle">preference data +</text>
  <text x="500" y="442" font-size="16" font-weight="700" fill="#1B2030" text-anchor="middle">a tight budget</text>

  <!-- ===================== GRPO LANE ===================== -->
  <rect x="672" y="152" width="288" height="318" rx="16" fill="#ffffff" stroke="#0D9488" stroke-width="1.8"/>
  <text x="816" y="200" font-size="27" font-weight="700" fill="#0F766E" text-anchor="middle">GRPO</text>
  <text x="816" y="230" font-size="15" fill="#6B7280" text-anchor="middle">PPO minus the critic;</text>
  <text x="816" y="251" font-size="15" fill="#6B7280" text-anchor="middle">group-relative advantage</text>
  <line x1="690" y1="286" x2="942" y2="286" stroke="#EBECF2" stroke-width="1"/>
  <text x="694" y="310" font-size="12" font-weight="600" letter-spacing="1.2" fill="#9AA0AE">USED BY</text>
  <text x="694" y="334" font-size="16" font-weight="600" fill="#1B2030">Reasoning models</text>
  <text x="694" y="353" font-size="14" fill="#6B7280">DeepSeek-R1 and the wave after</text>
  <rect x="688" y="374" width="256" height="82" rx="12" fill="#E9FBF6"/>
  <text x="704" y="398" font-size="12" font-weight="600" letter-spacing="1.2" fill="#0F766E">CHOOSE WHEN</text>
  <text x="816" y="422" font-size="16" font-weight="700" fill="#1B2030" text-anchor="middle">verifiable rewards:</text>
  <text x="816" y="442" font-size="16" font-weight="700" fill="#1B2030" text-anchor="middle">math, code, proofs</text>

  <!-- ===================== FOOTER ===================== -->
  <line x1="80" y1="494" x2="920" y2="494" stroke="#EBECF2" stroke-width="1"/>
  <text x="500" y="520" font-size="15" font-style="italic" fill="#5B6170" text-anchor="middle">Preference data → DPO or PPO (budget vs. ambition).&#160;&#160;Verifiable rewards → GRPO + RLVR.</text>
</svg>
