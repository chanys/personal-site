<svg viewBox="0 0 1008 490" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <style>
    .panel-title { font-size: 14px; font-weight: 600; fill: #1f2937; }
    .panel-caption { font-size: 11px; fill: #6b7280; }
    .panel-caption-em { font-size: 11px; fill: #1f2937; font-weight: 600; }
    .input-text { font-size: 12px; fill: #1f2937; font-family: ui-monospace, monospace; }
    .encoder-box { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.2; }
    .encoder-text { font-size: 11px; fill: #1e40af; font-weight: 500; }
    .vec-cell { fill: #2563eb; }
    .vec-line { stroke: #1e40af; stroke-width: 0.4; }
    .score-box { fill: #fde68a; stroke: #d97706; stroke-width: 1; }
    .score-text { font-size: 11px; fill: #78350f; font-weight: 600; }
    .arrow { stroke: #6b7280; stroke-width: 1.2; fill: none; }
    .shared-line { stroke: #94a3b8; stroke-width: 0.8; stroke-dasharray: 3,2; }
    .shared-label { font-size: 9px; fill: #64748b; font-style: italic; }
    .op-label { font-size: 10px; fill: #6b7280; font-style: italic; }
    .op-text { font-size: 12px; fill: #1f2937; font-style: italic; }
  </style>

  <!-- White background -->
  <rect width="1008" height="490" fill="white"/>

  <g transform="scale(1.4)">

  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Panel 1: Bi-encoder -->
  <g transform="translate(20, 20)">
    <text x="100" y="14" text-anchor="middle" class="panel-title">Bi-encoder</text>

    <text x="40" y="50" text-anchor="middle" class="input-text">query</text>
    <text x="160" y="50" text-anchor="middle" class="input-text">document</text>

    <line x1="40" y1="55" x2="40" y2="68" class="arrow" marker-end="url(#arrowhead)"/>
    <line x1="160" y1="55" x2="160" y2="68" class="arrow" marker-end="url(#arrowhead)"/>

    <rect x="10" y="70" width="60" height="40" rx="4" class="encoder-box"/>
    <text x="40" y="94" text-anchor="middle" class="encoder-text">Encoder</text>

    <rect x="130" y="70" width="60" height="40" rx="4" class="encoder-box"/>
    <text x="160" y="94" text-anchor="middle" class="encoder-text">Encoder</text>

    <line x1="70" y1="90" x2="130" y2="90" class="shared-line"/>
    <text x="100" y="88" text-anchor="middle" class="shared-label">shared</text>

    <line x1="40" y1="110" x2="40" y2="125" class="arrow" marker-end="url(#arrowhead)"/>
    <line x1="160" y1="110" x2="160" y2="125" class="arrow" marker-end="url(#arrowhead)"/>

    <!-- Single pooled vector per side -->
    <g transform="translate(30, 130)">
      <rect x="0" y="0" width="20" height="48" class="vec-cell"/>
      <line x1="0" y1="12" x2="20" y2="12" class="vec-line"/>
      <line x1="0" y1="24" x2="20" y2="24" class="vec-line"/>
      <line x1="0" y1="36" x2="20" y2="36" class="vec-line"/>
    </g>
    <g transform="translate(150, 130)">
      <rect x="0" y="0" width="20" height="48" class="vec-cell"/>
      <line x1="0" y1="12" x2="20" y2="12" class="vec-line"/>
      <line x1="0" y1="24" x2="20" y2="24" class="vec-line"/>
      <line x1="0" y1="36" x2="20" y2="36" class="vec-line"/>
    </g>

    <!-- Convergence to similarity -->
    <line x1="40" y1="178" x2="85" y2="200" class="arrow"/>
    <line x1="160" y1="178" x2="115" y2="200" class="arrow"/>

    <text x="100" y="216" text-anchor="middle" class="op-text">cos(q, d)</text>

    <line x1="100" y1="222" x2="100" y2="238" class="arrow" marker-end="url(#arrowhead)"/>

    <rect x="65" y="240" width="70" height="22" rx="3" class="score-box"/>
    <text x="100" y="255" text-anchor="middle" class="score-text">score</text>

    <text x="100" y="290" text-anchor="middle" class="panel-caption-em">Encode independently;</text>
    <text x="100" y="304" text-anchor="middle" class="panel-caption">compare via cosine.</text>
    <text x="100" y="318" text-anchor="middle" class="panel-caption">Doc embeddings cacheable.</text>
  </g>

  <!-- Panel 2: Cross-encoder -->
  <g transform="translate(260, 20)">
    <text x="100" y="14" text-anchor="middle" class="panel-title">Cross-encoder</text>

    <text x="100" y="50" text-anchor="middle" class="input-text">[CLS] query [SEP] doc</text>

    <line x1="100" y1="55" x2="100" y2="68" class="arrow" marker-end="url(#arrowhead)"/>

    <rect x="40" y="70" width="120" height="40" rx="4" class="encoder-box"/>
    <text x="100" y="94" text-anchor="middle" class="encoder-text">Encoder</text>

    <line x1="100" y1="110" x2="100" y2="125" class="arrow" marker-end="url(#arrowhead)"/>

    <!-- [CLS] pooled vector -->
    <rect x="70" y="130" width="60" height="22" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
    <text x="100" y="145" text-anchor="middle" font-size="10" fill="#1e40af">[CLS] vec</text>

    <line x1="100" y1="155" x2="100" y2="172" class="arrow" marker-end="url(#arrowhead)"/>

    <text x="100" y="186" text-anchor="middle" class="op-label">linear → scalar</text>

    <line x1="100" y1="192" x2="100" y2="238" class="arrow" marker-end="url(#arrowhead)"/>

    <rect x="65" y="240" width="70" height="22" rx="3" class="score-box"/>
    <text x="100" y="255" text-anchor="middle" class="score-text">score</text>

    <text x="100" y="290" text-anchor="middle" class="panel-caption-em">Encode jointly;</text>
    <text x="100" y="304" text-anchor="middle" class="panel-caption">single relevance score.</text>
    <text x="100" y="318" text-anchor="middle" class="panel-caption">Re-encode per (q, d) pair.</text>
  </g>

  <!-- Panel 3: Late interaction -->
  <g transform="translate(500, 20)">
    <text x="100" y="14" text-anchor="middle" class="panel-title">Late interaction (ColBERT)</text>

    <text x="40" y="50" text-anchor="middle" class="input-text">query</text>
    <text x="160" y="50" text-anchor="middle" class="input-text">document</text>

    <line x1="40" y1="55" x2="40" y2="68" class="arrow" marker-end="url(#arrowhead)"/>
    <line x1="160" y1="55" x2="160" y2="68" class="arrow" marker-end="url(#arrowhead)"/>

    <rect x="10" y="70" width="60" height="40" rx="4" class="encoder-box"/>
    <text x="40" y="94" text-anchor="middle" class="encoder-text">Encoder</text>

    <rect x="130" y="70" width="60" height="40" rx="4" class="encoder-box"/>
    <text x="160" y="94" text-anchor="middle" class="encoder-text">Encoder</text>

    <line x1="70" y1="90" x2="130" y2="90" class="shared-line"/>
    <text x="100" y="88" text-anchor="middle" class="shared-label">shared</text>

    <line x1="40" y1="110" x2="40" y2="125" class="arrow" marker-end="url(#arrowhead)"/>
    <line x1="160" y1="110" x2="160" y2="125" class="arrow" marker-end="url(#arrowhead)"/>

    <!-- Multiple token vectors per side -->
    <g transform="translate(15, 130)">
      <rect x="0" y="0" width="14" height="40" class="vec-cell"/>
      <rect x="18" y="0" width="14" height="40" class="vec-cell"/>
      <rect x="36" y="0" width="14" height="40" class="vec-cell"/>
    </g>
    <g transform="translate(125, 130)">
      <rect x="0" y="0" width="14" height="40" class="vec-cell"/>
      <rect x="18" y="0" width="14" height="40" class="vec-cell"/>
      <rect x="36" y="0" width="14" height="40" class="vec-cell"/>
      <rect x="54" y="0" width="14" height="40" class="vec-cell"/>
    </g>

    <text x="100" y="186" text-anchor="middle" class="op-label">per query token:</text>
    <text x="100" y="200" text-anchor="middle" class="op-text">max over doc tokens</text>
    <text x="100" y="218" text-anchor="middle" class="op-text">∑ MaxSim</text>

    <line x1="100" y1="222" x2="100" y2="238" class="arrow" marker-end="url(#arrowhead)"/>

    <rect x="65" y="240" width="70" height="22" rx="3" class="score-box"/>
    <text x="100" y="255" text-anchor="middle" class="score-text">score</text>

    <text x="100" y="290" text-anchor="middle" class="panel-caption-em">Token-level vectors;</text>
    <text x="100" y="304" text-anchor="middle" class="panel-caption">MaxSim per query token,</text>
    <text x="100" y="318" text-anchor="middle" class="panel-caption">summed over query.</text>
  </g>
  </g>
</svg>
