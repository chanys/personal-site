<svg viewBox="0 0 1000 820" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace; }
    </style>
  </defs>

  <rect width="1000" height="820" fill="#ffffff"/>

  <!-- ============================ HEADERS ============================ -->
  <text x="270" y="56" font-size="26" font-weight="700" fill="#1B2030" text-anchor="middle">Bad log</text>
  <text x="730" y="56" font-size="26" font-weight="700" fill="#1B2030" text-anchor="middle">Useful trace step</text>

  <line x1="80" y1="78" x2="460" y2="78" stroke="#E5E7EF" stroke-width="1.2"/>
  <line x1="540" y1="78" x2="920" y2="78" stroke="#E5E7EF" stroke-width="1.2"/>

  <!-- ============================ LEFT CARD: Bad log ============================ -->
  <rect x="80" y="110" width="380" height="430" rx="8" fill="#FFFCFC" stroke="#DC2626" stroke-width="1.5"/>

  <g class="mono" font-size="16" fill="#1B2030">
    <text x="105" y="158">14:23:18 run_551 query received</text>
    <text x="105" y="198">14:23:19 run_551 tool_call:</text>
    <text x="125" y="222">retrieval, status: success</text>
    <text x="105" y="262">14:23:21 run_551 response generated</text>
    <text x="105" y="302">14:23:21 run_551 run completed</text>
  </g>

  <text x="270" y="404" font-size="18" font-style="italic" fill="#6B7280" text-anchor="middle">events recorded;</text>
  <text x="270" y="434" font-size="18" font-style="italic" fill="#6B7280" text-anchor="middle">no decisions, no context,</text>
  <text x="270" y="464" font-size="18" font-style="italic" fill="#6B7280" text-anchor="middle">no verification, no state</text>

  <!-- ============================ RIGHT CARD: Useful trace step ============================ -->
