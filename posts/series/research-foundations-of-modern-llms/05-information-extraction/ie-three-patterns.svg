<svg viewBox="0 0 1000 574" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <style>.title { font-family: Georgia, 'Iowan Old Style', 'Times New Roman', serif; }</style>
    <marker id="ar" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 L2.5,5 Z" fill="#9AA0AE"/>
    </marker>
  </defs>

  <rect width="1000" height="574" fill="#ffffff"/>

  <text class="title" x="40" y="48" font-size="28" font-weight="700" fill="#161B2B">Three modern IE patterns</text>
  <text x="40" y="80" font-size="16.5" fill="#6B7280">They differ in where the LLM sits and what actually ships.</text>

  <!-- ===================== PANEL 1: Direct ===================== -->
  <rect x="40" y="110" width="288" height="400" rx="16" fill="#ffffff" stroke="#4F46E5" stroke-width="1.8"/>
  <text x="184" y="158" font-size="22" font-weight="700" fill="#3730A3" text-anchor="middle">Direct extraction</text>

  <rect x="80" y="190" width="208" height="50" rx="10" fill="#ffffff" stroke="#C7CAD6" stroke-width="1.3"/>
  <text x="184" y="221" font-size="16" fill="#1B2030" text-anchor="middle">Document</text>
  <line x1="184" y1="240" x2="184" y2="260" stroke="#9AA0AE" stroke-width="1.8" marker-end="url(#ar)"/>
  <rect x="80" y="262" width="208" height="50" rx="10" fill="#ffffff" stroke="#4F46E5" stroke-width="1.8"/>
  <text x="184" y="293" font-size="16" font-weight="700" fill="#3730A3" text-anchor="middle">LLM call · JSON</text>
  <line x1="184" y1="312" x2="184" y2="332" stroke="#9AA0AE" stroke-width="1.8" marker-end="url(#ar)"/>
  <rect x="80" y="334" width="208" height="50" rx="10" fill="#ffffff" stroke="#C7CAD6" stroke-width="1.3"/>
  <text x="184" y="365" font-size="16" fill="#1B2030" text-anchor="middle">Structured output</text>

  <rect x="54" y="404" width="260" height="88" rx="12" fill="#EEF1FE"/>
  <text x="184" y="444" font-size="18" font-weight="700" fill="#1B2030" text-anchor="middle">In the serving path</text>
  <text x="184" y="470" font-size="14.5" fill="#4B5563" text-anchor="middle">simple, latency-tolerant</text>

  <!-- ===================== PANEL 2: LLM-built specialist ===================== -->
  <rect x="356" y="110" width="288" height="400" rx="16" fill="#ffffff" stroke="#D97706" stroke-width="1.8"/>
  <text x="500" y="158" font-size="22" font-weight="700" fill="#B45309" text-anchor="middle">LLM-built specialist</text>

  <rect x="396" y="190" width="208" height="50" rx="10" fill="#F6F6F9" stroke="#B0B4C0" stroke-width="1.3" stroke-dasharray="5 3"/>
  <text x="500" y="221" font-size="16" fill="#6B7280" text-anchor="middle">LLM (offline)</text>
  <line x1="500" y1="240" x2="500" y2="260" stroke="#9AA0AE" stroke-width="1.8" marker-end="url(#ar)"/>
  <rect x="396" y="262" width="208" height="50" rx="10" fill="#ffffff" stroke="#C7CAD6" stroke-width="1.3"/>
  <text x="500" y="293" font-size="16" fill="#1B2030" text-anchor="middle">Training data</text>
  <line x1="500" y1="312" x2="500" y2="332" stroke="#9AA0AE" stroke-width="1.8" marker-end="url(#ar)"/>
  <rect x="396" y="334" width="208" height="50" rx="10" fill="#ffffff" stroke="#D97706" stroke-width="1.8"/>
  <text x="500" y="365" font-size="16" font-weight="700" fill="#B45309" text-anchor="middle">Specialist (serves)</text>

  <rect x="370" y="404" width="260" height="88" rx="12" fill="#FEF3C7"/>
  <text x="500" y="444" font-size="18" font-weight="700" fill="#1B2030" text-anchor="middle">LLM offline</text>
  <text x="500" y="470" font-size="14.5" fill="#4B5563" text-anchor="middle">a small specialist serves</text>

  <!-- ===================== PANEL 3: IE as workflow state ===================== -->
  <rect x="672" y="110" width="288" height="400" rx="16" fill="#ffffff" stroke="#0D9488" stroke-width="1.8"/>
  <text x="816" y="158" font-size="22" font-weight="700" fill="#0F766E" text-anchor="middle">IE as workflow state</text>

  <rect x="712" y="190" width="208" height="50" rx="10" fill="#ffffff" stroke="#C7CAD6" stroke-width="1.3"/>
  <text x="816" y="221" font-size="16" fill="#1B2030" text-anchor="middle">Raw text</text>
  <line x1="816" y1="240" x2="816" y2="260" stroke="#9AA0AE" stroke-width="1.8" marker-end="url(#ar)"/>
  <rect x="719" y="269" width="208" height="50" rx="10" fill="#F4FBF9" stroke="#9FD9CE" stroke-width="1.3"/>
  <rect x="712" y="262" width="208" height="50" rx="10" fill="#ffffff" stroke="#0D9488" stroke-width="1.8"/>
  <text x="816" y="293" font-size="16" font-weight="700" fill="#0F766E" text-anchor="middle">Extraction calls ×N</text>
  <line x1="816" y1="319" x2="816" y2="332" stroke="#9AA0AE" stroke-width="1.8" marker-end="url(#ar)"/>
  <rect x="712" y="334" width="208" height="50" rx="10" fill="#ffffff" stroke="#C7CAD6" stroke-width="1.3"/>
  <text x="816" y="365" font-size="16" fill="#1B2030" text-anchor="middle">Frames + metadata</text>

  <rect x="686" y="404" width="260" height="88" rx="12" fill="#E9FBF6"/>
  <text x="816" y="444" font-size="18" font-weight="700" fill="#1B2030" text-anchor="middle">Not the product</text>
  <text x="816" y="470" font-size="14.5" fill="#4B5563" text-anchor="middle">feeds a downstream system</text>

  <!-- ===================== FOOTER ===================== -->
  <line x1="80" y1="532" x2="920" y2="532" stroke="#EBECF2" stroke-width="1"/>
  <text x="500" y="556" font-size="15" font-style="italic" fill="#5B6170" text-anchor="middle">What differs: where the LLM sits, and whether extraction is the product or the scaffolding.</text>
</svg>
