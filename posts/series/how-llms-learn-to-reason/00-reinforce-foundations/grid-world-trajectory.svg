<svg viewBox="0 0 760 756" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <style>
      .title  { font-family: Georgia, 'Iowan Old Style', 'Times New Roman', serif; }
      .mono   { font-family: ui-monospace, 'SF Mono', 'Cascadia Mono', Menlo, Consolas, monospace; }
      .halo   { paint-order: stroke; stroke: #ffffff; stroke-width: 3.6; stroke-linejoin: round; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="14" markerHeight="14" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M0,0 L10,5 L0,10 L2.5,5 Z" fill="#4F46E5"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="14" markerHeight="14" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M0,0 L10,5 L0,10 L2.5,5 Z" fill="#15803D"/>
    </marker>
  </defs>

  <rect width="760" height="756" fill="#ffffff"/>

  <!-- Title -->
  <text class="title" x="40" y="48" font-size="25" font-weight="700" fill="#161B2B">Grid world: the example trajectory and its returns</text>
  <text x="40" y="74" font-size="13.5" fill="#6B7280">A 4×4 grid world with the worked trajectory τ and the return G&#8348; at every step.</text>

  <!-- ===================== GRID ===================== -->
  <rect x="96" y="108" width="384" height="384" fill="#FCFCFE" stroke="#C7CAD6" stroke-width="1.5"/>
  <g stroke="#E4E6EE" stroke-width="1">
    <line x1="192" y1="108" x2="192" y2="492"/>
    <line x1="288" y1="108" x2="288" y2="492"/>
    <line x1="384" y1="108" x2="384" y2="492"/>
    <line x1="96"  y1="204" x2="480" y2="204"/>
    <line x1="96"  y1="300" x2="480" y2="300"/>
    <line x1="96"  y1="396" x2="480" y2="396"/>
  </g>

  <!-- special cells -->
  <rect x="385.5" y="301.5" width="93" height="93" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
  <text x="432" y="356" font-size="30" font-weight="700" fill="#15803D" text-anchor="middle">+5</text>
  <text x="432" y="378" font-size="9" fill="#15803D" text-anchor="middle" letter-spacing="0.3">GOAL · TERMINAL</text>

  <rect x="385.5" y="109.5" width="93" height="93" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="432" y="164" font-size="30" font-weight="700" fill="#047857" text-anchor="middle">+4</text>
  <text x="432" y="186" font-size="10.5" fill="#047857" text-anchor="middle" letter-spacing="0.5">TERMINAL</text>

  <rect x="193.5" y="109.5" width="93" height="93" fill="#FEE2E2" stroke="#DC2626" stroke-width="2"/>
  <text x="240" y="164" font-size="30" font-weight="700" fill="#B91C1C" text-anchor="middle">−1</text>
  <text x="240" y="186" font-size="10.5" fill="#B91C1C" text-anchor="middle" letter-spacing="0.5">PENALTY</text>

  <!-- axis tick labels -->
  <g font-size="13" fill="#6B7280" text-anchor="middle">
    <text x="144" y="514">0</text>
    <text x="240" y="514">1</text>
    <text x="336" y="514">2</text>
    <text x="432" y="514">3</text>
    <text x="74" y="161">3</text>
    <text x="74" y="257">2</text>
    <text x="74" y="353">1</text>
    <text x="74" y="449">0</text>
  </g>
  <text x="60" y="102" font-size="12.5" fill="#9AA0AE">↑ y</text>
  <text x="470" y="514" font-size="12.5" fill="#9AA0AE">x →</text>

  <!-- ===================== TRAJECTORY ARROWS ===================== -->
  <g stroke="#4F46E5" stroke-width="3.4" stroke-linecap="round" fill="none" marker-end="url(#arrow)">
    <line x1="170" y1="444" x2="216" y2="444"/>   <!-- (0,0) -> (1,0)  right -->
    <line x1="240" y1="418" x2="240" y2="372"/>   <!-- (1,0) -> (1,1)  up -->
    <line x1="266" y1="348" x2="312" y2="348"/>   <!-- (1,1) -> (2,1)  right -->
  </g>
  <line x1="362" y1="348" x2="408" y2="348" stroke="#15803D" stroke-width="3.4" stroke-linecap="round" marker-end="url(#arrowGreen)"/>

  <!-- start marker -->
  <circle cx="144" cy="444" r="11" fill="none" stroke="#4F46E5" stroke-width="1.4" opacity="0.4"/>
  <circle cx="144" cy="444" r="6.5" fill="#4F46E5"/>
  <text x="144" y="432" font-size="11.5" fill="#4F46E5" text-anchor="middle" font-weight="600" class="halo">s&#8320;</text>

  <!-- per-step reward labels (hug the arrow) -->
  <g font-size="13" fill="#374151" text-anchor="middle" class="halo">
    <text x="210" y="430">r = −1</text>
    <text x="288" y="364">r = −1</text>
  </g>
  <text x="256" y="399" font-size="13" fill="#374151" text-anchor="start" class="halo">r = −1</text>
  <text x="360" y="366" font-size="13" fill="#15803D" font-weight="700" text-anchor="middle" class="halo">r = +5</text>

  <!-- return badges G_t (banded away from reward labels) -->
  <g>
    <rect x="112" y="464" width="64" height="22" rx="6" fill="#ffffff" stroke="#4F46E5" stroke-width="1.4"/>
    <text x="144" y="479" font-size="13" font-weight="700" fill="#4338CA" text-anchor="middle">G&#8320; = 2</text>

    <rect x="208" y="464" width="64" height="22" rx="6" fill="#ffffff" stroke="#4F46E5" stroke-width="1.4"/>
    <text x="240" y="479" font-size="13" font-weight="700" fill="#4338CA" text-anchor="middle">G&#8321; = 3</text>

    <rect x="208" y="304" width="64" height="22" rx="6" fill="#ffffff" stroke="#4F46E5" stroke-width="1.4"/>
    <text x="240" y="319" font-size="13" font-weight="700" fill="#4338CA" text-anchor="middle">G&#8322; = 4</text>

    <rect x="304" y="304" width="64" height="22" rx="6" fill="#ffffff" stroke="#4F46E5" stroke-width="1.4"/>
    <text x="336" y="319" font-size="13" font-weight="700" fill="#4338CA" text-anchor="middle">G&#8323; = 5</text>
  </g>

  <!-- ===================== LEGEND ===================== -->
  <rect x="512" y="108" width="220" height="300" rx="14" fill="#FAFBFD" stroke="#E5E7EF" stroke-width="1.2"/>
  <text x="532" y="139" font-size="14.5" font-weight="700" fill="#161B2B">Legend</text>

  <rect x="532" y="158" width="22" height="22" rx="4" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.6"/>
  <text x="566" y="167" font-size="13" fill="#1B2030">Terminal reward</text>
  <text x="566" y="183" font-size="11" fill="#6B7280">+5 / +4 · episode ends</text>

  <rect x="532" y="204" width="22" height="22" rx="4" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.6"/>
  <text x="566" y="213" font-size="13" fill="#1B2030">Penalty</text>
  <text x="566" y="229" font-size="11" fill="#6B7280">−1 · also a terminal</text>

  <line x1="532" y1="262" x2="556" y2="262" stroke="#4F46E5" stroke-width="3.2" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="566" y="259" font-size="13" fill="#1B2030">Trajectory τ</text>
  <text x="566" y="275" font-size="11" fill="#6B7280">the actions actually taken</text>

  <circle cx="543" cy="306" r="6" fill="#4F46E5"/>
  <text x="566" y="303" font-size="13" fill="#1B2030">Start state s&#8320;</text>
  <text x="566" y="319" font-size="11" fill="#6B7280">where the episode begins</text>

  <line x1="532" y1="344" x2="712" y2="344" stroke="#E5E7EF" stroke-width="1"/>
  <text x="532" y="366" font-size="11.5" fill="#6B7280" font-style="italic">Every step also costs r = −1</text>
  <text x="532" y="383" font-size="11.5" fill="#6B7280" font-style="italic">(fuel), so longer paths earn less.</text>

  <!-- ===================== RETURNS CARD ===================== -->
  <rect x="40" y="548" width="692" height="184" rx="14" fill="#FAFBFD" stroke="#E5E7EF" stroke-width="1.2"/>
  <text x="64" y="581" font-size="15" font-weight="700" fill="#161B2B">Return&#160;&#160;G&#8348; = sum of rewards from step <tspan font-style="italic">t</tspan> to the end of the episode</text>

  <g class="mono" font-size="14" fill="#1F2433">
    <text x="72" y="615">G&#8320;  =</text>
    <text x="72" y="641">G&#8321;  =</text>
    <text x="72" y="667">G&#8322;  =</text>
    <text x="72" y="693">G&#8323;  =</text>
    <g text-anchor="middle">
      <text x="150" y="615">(−1)</text><text x="215" y="615">(−1)</text><text x="280" y="615">(−1)</text><text x="345" y="615">(+5)</text>
                                        <text x="215" y="641">(−1)</text><text x="280" y="641">(−1)</text><text x="345" y="641">(+5)</text>
                                                                          <text x="280" y="667">(−1)</text><text x="345" y="667">(+5)</text>
                                                                                                            <text x="345" y="693">(+5)</text>
    </g>
    <g text-anchor="middle" fill="#9AA0AE">
      <text x="182" y="615">+</text><text x="247" y="615">+</text><text x="312" y="615">+</text>
      <text x="247" y="641">+</text><text x="312" y="641">+</text>
      <text x="312" y="667">+</text>
    </g>
    <g text-anchor="middle">
      <text x="388" y="615">=</text><text x="416" y="615" font-weight="700" fill="#4338CA">2</text>
      <text x="388" y="641">=</text><text x="416" y="641" font-weight="700" fill="#4338CA">3</text>
      <text x="388" y="667">=</text><text x="416" y="667" font-weight="700" fill="#4338CA">4</text>
      <text x="388" y="693">=</text><text x="416" y="693" font-weight="700" fill="#4338CA">5</text>
    </g>
  </g>
  <text x="452" y="615" font-size="12" fill="#6B7280">← four steps of fuel paid before the goal</text>
  <text x="452" y="693" font-size="12" fill="#6B7280">← one step from the goal</text>

  <line x1="64" y1="708" x2="708" y2="708" stroke="#EBECF2" stroke-width="1"/>
  <text x="64" y="725" font-size="12.5" fill="#5B6170" font-style="italic">Same successful path; earlier steps pay more fuel before reaching the +5, so their returns are smaller.</text>
</svg>
