<svg viewBox="0 0 1000 460" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <style>.title { font-family: Georgia, 'Iowan Old Style', 'Times New Roman', serif; }</style>
  </defs>

  <rect width="1000" height="460" fill="#ffffff"/>

  <text class="title" x="40" y="54" font-size="30" font-weight="700" fill="#161B2B">One number can't tell you what broke</text>

  <!-- ===================== CARD A: composite judge (wrong) ===================== -->
  <rect x="40" y="88" width="440" height="300" rx="14" fill="#ffffff" stroke="#DC2626" stroke-width="1.6"/>
  <text x="64" y="120" font-size="14" font-weight="700" letter-spacing="1.2" fill="#B91C1C">✗  COMPOSITE JUDGE<tspan font-weight="400" letter-spacing="0" fill="#6B7280">  ·  quality_judge_v3</tspan></text>

  <text x="260" y="206" font-size="38" font-weight="700" text-anchor="middle"><tspan fill="#5B6170">87%</tspan><tspan fill="#4F46E5">  →  </tspan><tspan fill="#B91C1C">81%</tspan></text>
  <text x="260" y="238" font-size="18" font-weight="600" fill="#B91C1C" text-anchor="middle">−6 pts over one release</text>

  <line x1="80" y1="272" x2="440" y2="272" stroke="#EBECF2" stroke-width="1"/>

  <text class="title" x="260" y="324" font-size="28" font-style="italic" font-weight="700" fill="#B91C1C" text-anchor="middle">what changed?</text>
  <text x="260" y="354" font-size="14" font-style="italic" fill="#9AA0AE" text-anchor="middle">read failures by hand · guess</text>

  <!-- ===================== CARD B: narrow evaluators (right) ===================== -->
  <rect x="520" y="88" width="440" height="300" rx="14" fill="#ffffff" stroke="#16A34A" stroke-width="1.6"/>
  <text x="544" y="120" font-size="14" font-weight="700" letter-spacing="1.2" fill="#15803D">✓  NARROW EVALUATORS</text>

  <!-- 5 rows, pitch 32, starting y=170 -->
  <text x="544" y="172" font-size="17" font-weight="700" fill="#B91C1C">Tone</text>
  <text x="936" y="172" font-size="16" text-anchor="end"><tspan fill="#5B6170">87  →  </tspan><tspan fill="#B91C1C" font-weight="700">60</tspan><tspan fill="#B91C1C">   ↓ −27</tspan></text>

  <text x="544" y="204" font-size="17" font-weight="700" fill="#1B2030">Redundancy</text>
  <text x="936" y="204" font-size="16" fill="#5B6170" text-anchor="end">89  →  88</text>

  <text x="544" y="236" font-size="17" font-weight="700" fill="#1B2030">Schema</text>
  <text x="936" y="236" font-size="16" fill="#5B6170" text-anchor="end">96  →  96</text>

  <text x="544" y="268" font-size="17" font-weight="700" fill="#1B2030">Routing</text>
  <text x="936" y="268" font-size="16" fill="#5B6170" text-anchor="end">86  →  87</text>

  <text x="544" y="300" font-size="17" font-weight="700" fill="#1B2030">Escalation</text>
  <text x="936" y="300" font-size="16" fill="#5B6170" text-anchor="end">80  →  80</text>

  <line x1="544" y1="328" x2="936" y2="328" stroke="#EBECF2" stroke-width="1"/>

  <text x="544" y="362" font-size="18" font-weight="700" fill="#15803D">→ tone regressed: fix tone</text>

  <!-- ===================== FOOTER ===================== -->
  <line x1="80" y1="414" x2="920" y2="414" stroke="#EBECF2" stroke-width="1"/>
  <text x="500" y="444" font-size="17" font-style="italic" fill="#5B6170" text-anchor="middle">Composite scores tell you something moved. Narrow evaluators tell you what.</text>
</svg>
