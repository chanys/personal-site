bibliography: references.bib

# Per-page SEO: canonical URL, og:url/og:type, and JSON-LD structured data
# (Person + WebSite on home, BlogPosting on posts). Not native to Quarto.
filters:
  - seo-meta.lua

# GitHub-Markdown-style lists: a `-` or `*` line directly under a paragraph
# starts a list with no blank line required. Avoids the over-large vertical
# gap that a preceding blank line would otherwise inject before the list.
from: markdown+lists_without_preceding_blankline

format:
  html:
    theme:
      light: [theme.scss, fieldnotes-rules.scss]
      dark: [theme-dark.scss, fieldnotes-rules.scss]
    css: styles.css
    toc: false
    code-copy: true
    code-overflow: wrap
    anchor-sections: true
    link-external-newwindow: true
    link-external-icon: false
    grid:
      body-width: 820px
      sidebar-width: 220px
      margin-width: 240px
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
      - text: |
          <!-- GoatCounter: privacy-friendly, cookieless analytics (no consent
               banner needed). Dashboard: https://yeesengchan.goatcounter.com -->
          <script data-goatcounter="https://yeesengchan.goatcounter.com/count"
                  async src="//gc.zgo.at/count.js"></script>
    # On series-part pages, Quarto's vendored scroll-spy
    # (site_libs/quarto-html/quarto.js -> updateActiveLink) compares
    # window.pageYOffset against each section's offsetTop. offsetTop is
    # relative to the element's offsetParent, not the document, so the
    # active-link choice lags the actual viewport position (most visible
    # on series-part pages where .series-nav pushes content down). We
    # can't safely edit the vendored file (regenerated each build), so
    # the shim below recomputes the active link from
    # getBoundingClientRect() and re-applies after Quarto's own handler
    # via requestAnimationFrame. Scoped to .series-nav pages.
    include-after-body:
      - text: |
          <script>
          (() => {
            if (!document.querySelector('.series-nav')) return;
            const toc = document.querySelector('nav#TOC[role="doc-toc"]');
            if (!toc) return;
            const links = [...toc.querySelectorAll('a[data-scroll-target]')];
            if (!links.length) return;
            const sections = links.map((link) => {
              const target = link.getAttribute('data-scroll-target') || '';
              return target.startsWith('#')
                ? document.getElementById(decodeURI(target.slice(1)))
                : null;
            });
            // Distance below viewport top at which a heading is treated as
            // "the current section." Small, so the highlight matches what a
            // reader perceives as the heading at the top of the page.
            const ACTIVATION_OFFSET = 80;
            const apply = () => {
              let idx = 0;
              const atBottom = window.innerHeight + window.pageYOffset
                >= document.documentElement.scrollHeight - 2;
              if (atBottom) {
                idx = sections.length - 1;
              } else {
                for (let i = 0; i < sections.length; i++) {
                  const s = sections[i];
                  if (s && s.getBoundingClientRect().top <= ACTIVATION_OFFSET) idx = i;
                }
              }
              for (let i = 0; i < links.length; i++) {
                links[i].classList.toggle('active', i === idx);
              }
            };
            // rAF ensures we run after Quarto's synchronous scroll handler
            // so our active-class choice wins.
            let pending = false;
            const schedule = () => {
              if (pending) return;
              pending = true;
              requestAnimationFrame(() => { apply(); pending = false; });
            };
            schedule();
            document.addEventListener('scroll', schedule, { passive: true });
            window.addEventListener('resize', schedule);
            window.addEventListener('load', schedule);
          })();
          </script>
