<svg viewBox="0 0 1000 760" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <style>.title { font-family: Georgia, 'Iowan Old Style', 'Times New Roman', serif; }</style>
  </defs>

  <!-- White background -->
  <rect width="1000" height="760" fill="#ffffff"/>

  <!-- Title -->
  <text class="title" x="500" y="56" font-size="36" font-weight="700" fill="#161B2B" text-anchor="middle">The harness has four jobs</text>

  <!-- ================== CARD 1: DECIDE (indigo) ================== -->
  <g transform="translate(30, 100)">
    <rect width="460" height="310" rx="14" fill="#ffffff" stroke="#4F46E5" stroke-width="1.8"/>

    <circle cx="44" cy="50" r="22" fill="#4F46E5"/>
    <text x="44" y="58" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
    <text x="74" y="57" font-size="22" font-weight="700" fill="#161B2B">Decide what the model sees</text>

    <text x="32" y="108" font-size="17" font-style="italic" fill="#5B6170">Build the right context, not a pile of everything.</text>

    <text x="32" y="168" font-size="22" fill="#1B2030">•  state</text>
    <text x="32" y="204" font-size="22" fill="#1B2030">•  context assembly</text>
  </g>

  <!-- ================== CARD 2: LIMIT (amber) ================== -->
  <g transform="translate(510, 100)">
    <rect width="460" height="310" rx="14" fill="#ffffff" stroke="#D97706" stroke-width="1.8"/>

    <circle cx="44" cy="50" r="22" fill="#D97706"/>
    <text x="44" y="58" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">2</text>
    <text x="74" y="57" font-size="22" font-weight="700" fill="#161B2B">Limit what the model can do</text>

    <text x="32" y="108" font-size="17" font-style="italic" fill="#5B6170">Approve actions before they run.</text>

    <text x="32" y="160" font-size="22" fill="#1B2030">•  workflow phases</text>
    <text x="32" y="190" font-size="22" fill="#1B2030">•  tool contracts</text>
    <text x="32" y="220" font-size="22" fill="#1B2030">•  gates</text>
    <text x="32" y="250" font-size="22" fill="#1B2030">•  approval packets</text>
    <text x="32" y="280" font-size="22" fill="#1B2030">•  permissions</text>
  </g>

  <!-- ================== CARD 3: CHECK (teal) ================== -->
  <g transform="translate(30, 430)">
    <rect width="460" height="310" rx="14" fill="#ffffff" stroke="#0D9488" stroke-width="1.8"/>

    <circle cx="44" cy="50" r="22" fill="#0D9488"/>
    <text x="44" y="58" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
    <text x="74" y="57" font-size="22" font-weight="700" fill="#161B2B">Check what actually happened</text>

    <text x="32" y="108" font-size="17" font-style="italic" fill="#5B6170">Verify the world, not just the tool's success.</text>

    <text x="32" y="168" font-size="22" fill="#1B2030">•  state readback</text>
    <text x="32" y="204" font-size="22" fill="#1B2030">•  grounding checks</text>
    <text x="32" y="240" font-size="22" fill="#1B2030">•  safe fallbacks</text>
  </g>

  <!-- ================== CARD 4: RECORD (slate) ================== -->
  <g transform="translate(510, 430)">
    <rect width="460" height="310" rx="14" fill="#ffffff" stroke="#475569" stroke-width="1.8"/>

    <circle cx="44" cy="50" r="22" fill="#475569"/>
    <text x="44" y="58" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">4</text>
    <text x="74" y="57" font-size="22" font-weight="700" fill="#161B2B">Keep a record</text>

    <text x="32" y="108" font-size="17" font-style="italic" fill="#5B6170">Failures should leave evidence.</text>

    <text x="32" y="152" font-size="22" fill="#1B2030">•  traces</text>
    <text x="32" y="180" font-size="22" fill="#1B2030">•  versions</text>
    <text x="32" y="208" font-size="22" fill="#1B2030">•  decisions</text>
    <text x="32" y="236" font-size="22" fill="#1B2030">•  tool inputs and outputs</text>
    <text x="32" y="264" font-size="22" fill="#1B2030">•  verification results</text>
    <text x="32" y="292" font-size="22" fill="#1B2030">•  regression cases</text>
  </g>
</svg>
