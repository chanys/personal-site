<svg viewBox="0 0 800 490" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <!-- Title -->
  <text x="400" y="32" font-size="19.6" font-weight="600" text-anchor="middle" fill="#222">Three jobs, two loss families</text>

  <!-- ===== TOP BAND: cross-entropy family (stages 1-2) ===== -->
  <rect x="10" y="40" width="780" height="240" rx="8" fill="#eef4fa" stroke="#c4d8ec" stroke-width="1"/>
  <text x="20" y="60" font-size="15.4" font-weight="600" fill="#3a7ca5">Loss family A: next-token cross-entropy</text>

  <!-- Stage 1: Pretraining -->
  <g>
    <rect x="25" y="75" width="365" height="190" rx="6" fill="white" stroke="#3a7ca5" stroke-width="1.5"/>
    <text x="207" y="98" font-size="18.2" font-weight="600" text-anchor="middle" fill="#222">1. Pretraining</text>
    <line x1="40" y1="108" x2="375" y2="108" stroke="#c4d8ec" stroke-width="1"/>

    <text x="40" y="130" font-size="15.4" font-weight="600" fill="#666">Data:</text>
    <text x="90" y="130" font-size="15.4" fill="#222">raw text</text>

    <text x="40" y="158" font-size="15.4" font-weight="600" fill="#666">Loss:</text>
    <text x="90" y="158" font-size="16.8" fill="#222" font-style="italic">−Σ log p(x_t | x_&lt;t)</text>

    <text x="40" y="186" font-size="15.4" font-weight="600" fill="#666">Mask:</text>
    <text x="90" y="186" font-size="15.4" fill="#222">all tokens contribute</text>

    <text x="40" y="222" font-size="14" font-style="italic" fill="#888">Goal: absorb world knowledge,</text>
    <text x="40" y="246" font-size="14" font-style="italic" fill="#888">learn the distribution of language.</text>
  </g>

  <!-- Stage 2: SFT -->
  <g>
    <rect x="410" y="75" width="365" height="190" rx="6" fill="white" stroke="#3a7ca5" stroke-width="1.5"/>
    <text x="592" y="98" font-size="18.2" font-weight="600" text-anchor="middle" fill="#222">2. Supervised fine-tuning (SFT)</text>
    <line x1="425" y1="108" x2="760" y2="108" stroke="#c4d8ec" stroke-width="1"/>

    <text x="425" y="130" font-size="15.4" font-weight="600" fill="#666">Data:</text>
    <text x="475" y="130" font-size="15.4" fill="#222">(instruction, response) pairs</text>

    <text x="425" y="158" font-size="15.4" font-weight="600" fill="#666">Loss:</text>
    <text x="475" y="158" font-size="16.8" fill="#222" font-style="italic">−Σ log p(y_t | x, y_&lt;t)</text>

    <text x="425" y="186" font-size="15.4" font-weight="600" fill="#666">Mask:</text>
    <text x="475" y="186" font-size="15.4" fill="#222">response tokens only</text>

    <text x="425" y="218" font-size="14" font-style="italic" fill="#888">Also called: instruction tuning,</text>
    <text x="425" y="240" font-size="14" font-style="italic" fill="#888">demonstration tuning, distilled SFT,</text>
    <text x="425" y="262" font-size="14" font-style="italic" fill="#888">chat tuning. Same operation, different data.</text>
  </g>

  <!-- Annotation: "same loss, different data" -->
  <text x="400" y="298" font-size="15.4" font-style="italic" text-anchor="middle" fill="#3a7ca5">Stages 1–2 share the same loss. They differ in data composition and which tokens get masked.</text>

  <!-- ===== BOTTOM BAND: preference loss family (stage 3) ===== -->
  <rect x="10" y="318" width="780" height="160" rx="8" fill="#fbeef0" stroke="#e8c4cc" stroke-width="1"/>
  <text x="20" y="338" font-size="15.4" font-weight="600" fill="#a83232">Loss family B: preference</text>

  <g>
    <rect x="200" y="350" width="400" height="120" rx="6" fill="white" stroke="#a83232" stroke-width="1.5"/>
    <text x="400" y="372" font-size="18.2" font-weight="600" text-anchor="middle" fill="#222">3. Preference optimization</text>
    <line x1="215" y1="382" x2="585" y2="382" stroke="#e8c4cc" stroke-width="1"/>

    <text x="215" y="402" font-size="15.4" font-weight="600" fill="#666">Data:</text>
    <text x="265" y="402" font-size="15.4" fill="#222">(prompt, chosen, rejected) triples</text>

    <text x="215" y="422" font-size="15.4" font-weight="600" fill="#666">Loss:</text>
    <text x="265" y="422" font-size="15.4" fill="#222">RLHF / DPO / GRPO (see RL series)</text>

    <text x="215" y="438" font-size="14" font-style="italic" fill="#888">no longer comparing to a target sequence,</text>
    <text x="215" y="458" font-size="14" font-style="italic" fill="#888">now comparing to a competing one</text>
  </g>
</svg>
