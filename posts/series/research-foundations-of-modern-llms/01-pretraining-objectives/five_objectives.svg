<svg viewBox="0 0 1008 840" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <style>
    .row-title { font-size: 14px; font-weight: 600; fill: #1f2937; }
    .row-annot { font-size: 11px; fill: #6b7280; }
    .row-annot-bold { font-size: 11px; fill: #6b7280; font-weight: 600; }
    .header-text { font-size: 12px; fill: #4b5563; font-style: italic; }

    .tok-orig { fill: white; stroke: #6b7280; stroke-width: 1; }
    .tok-orig-text { font-size: 12px; fill: #1f2937; }

    .tok-mask { fill: #e5e7eb; stroke: #9ca3af; stroke-width: 1; stroke-dasharray: 3,2; }
    .tok-mask-text { font-size: 11px; fill: #6b7280; font-family: ui-monospace, monospace; }

    .tok-repl { fill: #fecaca; stroke: #dc2626; stroke-width: 1; }
    .tok-repl-text { font-size: 12px; fill: #991b1b; }

    .tok-sent { fill: #dbeafe; stroke: #2563eb; stroke-width: 1; }
    .tok-sent-text { font-size: 11px; fill: #1e40af; font-weight: 600; font-family: ui-monospace, monospace; }

    .tok-targ { fill: #fde68a; stroke: #d97706; stroke-width: 1; }
    .tok-targ-text { font-size: 12px; fill: #78350f; font-weight: 500; }

    .tok-pre { fill: #d1fae5; stroke: #059669; stroke-width: 1; }
    .tok-pre-text { font-size: 12px; fill: #064e3b; }

    .check { font-size: 13px; fill: #059669; font-weight: 700; }
    .cross { font-size: 13px; fill: #dc2626; font-weight: 700; }

    .next-tok { font-size: 11px; fill: #78350f; font-style: italic; }
  </style>

  <!-- White background -->
  <rect width="1008" height="840" fill="white"/>

  <g transform="scale(1.4)">

  <text x="360" y="22" text-anchor="middle" class="header-text">Source: "The cat sat on the mat watching" (same sentence under each objective)</text>

  <!-- Row 1: MLM (BERT) -->
  <g transform="translate(0, 50)">
    <text x="20" y="14" class="row-title">MLM (BERT)</text>
    <g transform="translate(80, 24)">
      <rect x="0" y="0" width="60" height="28" class="tok-orig"/><text x="30" y="18" text-anchor="middle" class="tok-orig-text">The</text>
      <rect x="68" y="0" width="60" height="28" class="tok-orig"/><text x="98" y="18" text-anchor="middle" class="tok-orig-text">cat</text>
      <rect x="136" y="0" width="60" height="28" class="tok-mask"/><text x="166" y="18" text-anchor="middle" class="tok-mask-text">[MASK]</text>
      <rect x="204" y="0" width="60" height="28" class="tok-orig"/><text x="234" y="18" text-anchor="middle" class="tok-orig-text">on</text>
      <rect x="272" y="0" width="60" height="28" class="tok-orig"/><text x="302" y="18" text-anchor="middle" class="tok-orig-text">the</text>
      <rect x="340" y="0" width="60" height="28" class="tok-orig"/><text x="370" y="18" text-anchor="middle" class="tok-orig-text">mat</text>
      <rect x="408" y="0" width="60" height="28" class="tok-mask"/><text x="438" y="18" text-anchor="middle" class="tok-mask-text">[MASK]</text>
    </g>
    <text x="20" y="78" class="row-annot">Mask ~15% of tokens; predict each masked position from bidirectional context. Targets: <tspan font-weight="600" fill="#78350f">sat</tspan>, <tspan font-weight="600" fill="#78350f">watching</tspan>.</text>
  </g>

  <!-- Row 2: RTD (ELECTRA) -->
  <g transform="translate(0, 140)">
    <text x="20" y="14" class="row-title">RTD (ELECTRA)</text>
    <g transform="translate(80, 24)">
      <rect x="0" y="0" width="60" height="28" class="tok-orig"/><text x="30" y="18" text-anchor="middle" class="tok-orig-text">The</text>
      <rect x="68" y="0" width="60" height="28" class="tok-orig"/><text x="98" y="18" text-anchor="middle" class="tok-orig-text">cat</text>
      <rect x="136" y="0" width="60" height="28" class="tok-repl"/><text x="166" y="18" text-anchor="middle" class="tok-repl-text">ran</text>
      <rect x="204" y="0" width="60" height="28" class="tok-orig"/><text x="234" y="18" text-anchor="middle" class="tok-orig-text">on</text>
      <rect x="272" y="0" width="60" height="28" class="tok-orig"/><text x="302" y="18" text-anchor="middle" class="tok-orig-text">the</text>
      <rect x="340" y="0" width="60" height="28" class="tok-orig"/><text x="370" y="18" text-anchor="middle" class="tok-orig-text">mat</text>
      <rect x="408" y="0" width="60" height="28" class="tok-repl"/><text x="438" y="18" text-anchor="middle" class="tok-repl-text">barking</text>
    </g>
    <g transform="translate(80, 68)">
      <text x="30" y="0" text-anchor="middle" class="check">✓</text>
      <text x="98" y="0" text-anchor="middle" class="check">✓</text>
      <text x="166" y="0" text-anchor="middle" class="cross">✗</text>
      <text x="234" y="0" text-anchor="middle" class="check">✓</text>
      <text x="302" y="0" text-anchor="middle" class="check">✓</text>
      <text x="370" y="0" text-anchor="middle" class="check">✓</text>
      <text x="438" y="0" text-anchor="middle" class="cross">✗</text>
    </g>
    <text x="20" y="92" class="row-annot">Generator replaces tokens; discriminator predicts <tspan fill="#059669" font-weight="600">✓ original</tspan> or <tspan fill="#dc2626" font-weight="600">✗ replaced</tspan>. Loss fires on every token.</text>
  </g>

  <!-- Row 3: Span corruption (T5) -->
  <g transform="translate(0, 250)">
    <text x="20" y="14" class="row-title">Span corruption (T5)</text>
    <text x="20" y="44" class="row-annot-bold">Input:</text>
    <g transform="translate(80, 26)">
      <rect x="0" y="0" width="60" height="28" class="tok-orig"/><text x="30" y="18" text-anchor="middle" class="tok-orig-text">The</text>
      <rect x="68" y="0" width="60" height="28" class="tok-orig"/><text x="98" y="18" text-anchor="middle" class="tok-orig-text">cat</text>
      <rect x="136" y="0" width="60" height="28" class="tok-sent"/><text x="166" y="18" text-anchor="middle" class="tok-sent-text">&lt;X&gt;</text>
      <rect x="204" y="0" width="60" height="28" class="tok-orig"/><text x="234" y="18" text-anchor="middle" class="tok-orig-text">the</text>
      <rect x="272" y="0" width="60" height="28" class="tok-orig"/><text x="302" y="18" text-anchor="middle" class="tok-orig-text">mat</text>
      <rect x="340" y="0" width="60" height="28" class="tok-sent"/><text x="370" y="18" text-anchor="middle" class="tok-sent-text">&lt;Y&gt;</text>
    </g>
    <text x="20" y="88" class="row-annot-bold">Target:</text>
    <g transform="translate(80, 70)">
      <rect x="0" y="0" width="60" height="28" class="tok-sent"/><text x="30" y="18" text-anchor="middle" class="tok-sent-text">&lt;X&gt;</text>
      <rect x="68" y="0" width="60" height="28" class="tok-targ"/><text x="98" y="18" text-anchor="middle" class="tok-targ-text">sat</text>
      <rect x="136" y="0" width="60" height="28" class="tok-targ"/><text x="166" y="18" text-anchor="middle" class="tok-targ-text">on</text>
      <rect x="204" y="0" width="60" height="28" class="tok-sent"/><text x="234" y="18" text-anchor="middle" class="tok-sent-text">&lt;Y&gt;</text>
      <rect x="272" y="0" width="60" height="28" class="tok-targ"/><text x="302" y="18" text-anchor="middle" class="tok-targ-text">watching</text>
      <rect x="340" y="0" width="60" height="28" class="tok-sent"/><text x="370" y="18" text-anchor="middle" class="tok-sent-text">&lt;Z&gt;</text>
    </g>
    <text x="20" y="120" class="row-annot">Mask contiguous spans with sentinels. Encoder reads input; decoder generates (sentinel, span) pairs.</text>
  </g>

  <!-- Row 4: CLM (GPT) -->
  <g transform="translate(0, 390)">
    <text x="20" y="14" class="row-title">CLM (GPT)</text>
    <g transform="translate(80, 24)">
      <rect x="0" y="0" width="60" height="28" class="tok-orig"/><text x="30" y="18" text-anchor="middle" class="tok-orig-text">The</text>
      <rect x="68" y="0" width="60" height="28" class="tok-orig"/><text x="98" y="18" text-anchor="middle" class="tok-orig-text">cat</text>
      <rect x="136" y="0" width="60" height="28" class="tok-orig"/><text x="166" y="18" text-anchor="middle" class="tok-orig-text">sat</text>
      <rect x="204" y="0" width="60" height="28" class="tok-orig"/><text x="234" y="18" text-anchor="middle" class="tok-orig-text">on</text>
      <rect x="272" y="0" width="60" height="28" class="tok-orig"/><text x="302" y="18" text-anchor="middle" class="tok-orig-text">the</text>
      <rect x="340" y="0" width="60" height="28" class="tok-orig"/><text x="370" y="18" text-anchor="middle" class="tok-orig-text">mat</text>
      <rect x="408" y="0" width="60" height="28" class="tok-orig"/><text x="438" y="18" text-anchor="middle" class="tok-orig-text">watching</text>
    </g>
    <g transform="translate(80, 68)">
      <text x="30" y="0" text-anchor="middle" class="next-tok">cat</text>
      <text x="98" y="0" text-anchor="middle" class="next-tok">sat</text>
      <text x="166" y="0" text-anchor="middle" class="next-tok">on</text>
      <text x="234" y="0" text-anchor="middle" class="next-tok">the</text>
      <text x="302" y="0" text-anchor="middle" class="next-tok">mat</text>
      <text x="370" y="0" text-anchor="middle" class="next-tok">watching</text>
      <text x="438" y="0" text-anchor="middle" class="next-tok">?</text>
    </g>
    <text x="540" y="68" class="row-annot" font-style="italic">← next-token target</text>
    <text x="20" y="92" class="row-annot">Each position predicts the next token from left context only. No corruption; data fed unchanged.</text>
  </g>

  <!-- Row 5: FIM (code models) -->
  <g transform="translate(0, 500)">
    <text x="20" y="14" class="row-title">FIM (code models)</text>
    <g transform="translate(80, 24)">
      <rect x="0" y="0" width="60" height="28" class="tok-pre"/><text x="30" y="18" text-anchor="middle" class="tok-pre-text">The</text>
      <rect x="68" y="0" width="60" height="28" class="tok-pre"/><text x="98" y="18" text-anchor="middle" class="tok-pre-text">cat</text>
      <rect x="136" y="0" width="60" height="28" class="tok-targ"/><text x="166" y="18" text-anchor="middle" class="tok-targ-text">sat</text>
      <rect x="204" y="0" width="60" height="28" class="tok-targ"/><text x="234" y="18" text-anchor="middle" class="tok-targ-text">on</text>
      <rect x="272" y="0" width="60" height="28" class="tok-pre"/><text x="302" y="18" text-anchor="middle" class="tok-pre-text">the</text>
      <rect x="340" y="0" width="60" height="28" class="tok-pre"/><text x="370" y="18" text-anchor="middle" class="tok-pre-text">mat</text>
      <rect x="408" y="0" width="60" height="28" class="tok-pre"/><text x="438" y="18" text-anchor="middle" class="tok-pre-text">watching</text>
    </g>
    <text x="20" y="78" class="row-annot"><tspan fill="#064e3b" font-weight="600">Prefix</tspan> + <tspan fill="#064e3b" font-weight="600">suffix</tspan> as observed; predict the <tspan fill="#78350f" font-weight="600">middle span</tspan>. Data is rearranged at training time.</text>
  </g>
  </g>
</svg>
